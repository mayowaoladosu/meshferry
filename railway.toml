[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
watchPatterns = [
  "/src/**",
  "/scripts/**",
  "/package.json",
  "/package-lock.json",
  "/tsconfig.json",
  "/Dockerfile",
  "/railway.toml"
]

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
